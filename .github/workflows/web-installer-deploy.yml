name: Deploy web installer

on:
  push:
    branches: [main]
    paths:
      - "firmware/src/**"
      - "firmware/platformio.ini"
      - "firmware/tools/prepare_web_installer.py"
      - "web-installer/**"
      - ".github/workflows/web-installer-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (esp32dev)
        working-directory: firmware
        run: pio run -e esp32dev

      - name: Stage web installer binaries + manifest
        working-directory: firmware
        run: python3 tools/prepare_web_installer.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-installer

      - id: deployment
        uses: actions/deploy-pages@v4
