; PlatformIO project for the BambuLab Status Bar
; https://docs.platformio.org/page/projectconf.html

[env]
lib_deps =
    knolleary/PubSubClient @ ^2.8
    fastled/FastLED @ ^3.7.0
    bblanchon/ArduinoJson @ ^7.1.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -D MQTT_MAX_PACKET_SIZE=4096
lib_deps =
    ${env.lib_deps}
    tzapu/WiFiManager @ ^2.0.17

; Host-side unit tests for the pure state-machine logic (no ESP32 hardware
; needed). Run with: pio test -e native
; Only PrinterState.{h,cpp} is Arduino/hardware-independent, so that's all
; this environment builds from src/ — everything else (LedController,
; BambuMqttClient, Provisioning, main) needs the ESP32 Arduino core.
[env:native]
platform = native
build_flags =
    -std=c++17
    -D UNIT_TEST
build_src_filter =
    +<*>
    -<main.cpp>
    -<LedController.cpp>
    -<BambuMqttClient.cpp>
    -<Provisioning.cpp>
test_build_src = yes
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
